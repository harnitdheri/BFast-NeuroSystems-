<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BFast AI NeuroSystems — Neurovascular Monitoring</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: radial-gradient(ellipse at 20% 50%, #0D2456 0%, #050E1F 50%, #020912 100%);
      font-family: 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
    button { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const C = {
      navy: "#050E1F", navyMid: "#0A1A35", navyLight: "#112244",
      teal: "#00D4B8", tealDark: "#00A896", blue: "#1A6BFF", blueLight: "#4D94FF",
      red: "#FF3B5C", amber: "#FFB300", green: "#00E676", purple: "#9B59FF",
      white: "#FFFFFF", gray: "#8A9BBE", grayLight: "#C5CFDF",
      card: "rgba(255,255,255,0.06)", cardBorder: "rgba(255,255,255,0.1)",
    };

    const Pill = ({ color, children }) => (
      <span style={{ background: color+"22", color, border:`1px solid ${color}55`, borderRadius:20, padding:"2px 9px", fontSize:10, fontWeight:700, letterSpacing:"0.05em", whiteSpace:"nowrap" }}>{children}</span>
    );

    const VitalCard = ({ label, value, unit, color, sub }) => (
      <div style={{ background:C.card, border:`1px solid ${color}33`, borderRadius:12, padding:"10px 12px", flex:1, minWidth:0 }}>
        <div style={{ fontSize:9, color:C.gray, marginBottom:4, letterSpacing:"0.08em", textTransform:"uppercase" }}>{label}</div>
        <div style={{ fontSize:22, fontWeight:800, color, lineHeight:1 }}>
          {value}<span style={{ fontSize:10, fontWeight:400, color:C.gray, marginLeft:2 }}>{unit}</span>
        </div>
        {sub && <div style={{ fontSize:9, color:C.gray, marginTop:3 }}>{sub}</div>}
      </div>
    );

    const TabBar = ({ tabs, active, onSelect, accent=C.teal }) => (
      <div style={{ display:"flex", background:"rgba(0,0,0,0.3)", borderTop:"1px solid rgba(255,255,255,0.07)", padding:"6px 0 4px" }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => onSelect(t.id)} style={{ flex:1, background:"none", border:"none", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:3, padding:"4px 2px" }}>
            <span style={{ fontSize:16 }}>{t.icon}</span>
            <span style={{ fontSize:8, color:active===t.id?accent:C.gray, fontWeight:active===t.id?700:400 }}>{t.label}</span>
            {active===t.id && <div style={{ width:16, height:2, borderRadius:2, background:accent }} />}
          </button>
        ))}
      </div>
    );

    const SectionTitle = ({ children, right }) => (
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
        <div style={{ fontSize:11, fontWeight:700, color:C.grayLight, letterSpacing:"0.06em", textTransform:"uppercase" }}>{children}</div>
        {right && <div style={{ fontSize:9, color:C.teal }}>{right}</div>}
      </div>
    );

    const RiskGauge = ({ pct, color }) => {
      const r=28, circ=2*Math.PI*r;
      return (
        <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
          <svg width={72} height={72} viewBox="0 0 72 72">
            <circle cx={36} cy={36} r={r} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth={6}/>
            <circle cx={36} cy={36} r={r} fill="none" stroke={color} strokeWidth={6}
              strokeDasharray={`${(pct/100)*circ} ${circ}`} strokeLinecap="round" transform="rotate(-90 36 36)"/>
            <text x={36} y={40} textAnchor="middle" fill={color} fontSize={13} fontWeight={800}>{pct}%</text>
          </svg>
          <div style={{ fontSize:9, color:C.gray }}>Stroke Risk</div>
        </div>
      );
    };

    const Sparkline = ({ data, color, width=230, height=36 }) => {
      const max=Math.max(...data), min=Math.min(...data);
      const pts = data.map((v,i) => `${(i/(data.length-1))*width},${height-((v-min)/(max-min||1))*height}`).join(" ");
      const last = pts.split(" ").slice(-1)[0].split(",");
      return (
        <svg width={width} height={height} style={{ overflow:"visible" }}>
          <polyline points={pts} fill="none" stroke={color} strokeWidth={1.5} strokeLinejoin="round"/>
          <circle cx={last[0]} cy={last[1]} r={2.5} fill={color}/>
        </svg>
      );
    };

    // ── CLINICAL SCREENS ────────────────────────────────────────────────────────

    const ClinicalDashboard = () => {
      const patients = [
        { name:"Eleanor R.", id:"PT-4821", risk:87, status:"CRITICAL", color:C.red, vitals:"HR 118 · BP 182/94" },
        { name:"James K.", id:"PT-3304", risk:54, status:"MODERATE", color:C.amber, vitals:"HR 88 · BP 148/82" },
        { name:"Maria S.", id:"PT-2917", risk:31, status:"STABLE", color:C.green, vitals:"HR 72 · BP 128/76" },
        { name:"Robert T.", id:"PT-1558", risk:22, status:"STABLE", color:C.green, vitals:"HR 68 · BP 122/78" },
      ];
      return (
        <div style={{ padding:12, overflowY:"auto", height:"100%" }}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:14 }}>
            {[{label:"Active Patients",value:"12",color:C.teal},{label:"Critical Alerts",value:"2",color:C.red},{label:"Pending Review",value:"5",color:C.amber}].map(s=>(
              <div key={s.label} style={{ background:C.card, border:`1px solid ${s.color}33`, borderRadius:10, padding:"8px 10px", textAlign:"center" }}>
                <div style={{ fontSize:20, fontWeight:800, color:s.color }}>{s.value}</div>
                <div style={{ fontSize:8, color:C.gray, marginTop:2 }}>{s.label}</div>
              </div>
            ))}
          </div>
          <SectionTitle right="View All →">Monitored Patients</SectionTitle>
          {patients.map((p,i)=>(
            <div key={i} style={{ background:p.risk>80?"rgba(255,59,92,0.08)":C.card, border:`1px solid ${p.color}33`, borderRadius:12, padding:"10px 12px", marginBottom:8, display:"flex", alignItems:"center", gap:10 }}>
              <div style={{ width:36, height:36, borderRadius:"50%", background:p.color+"22", border:`2px solid ${p.color}66`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, flexShrink:0 }}>
                {p.risk>70?"⚠️":"👤"}
              </div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <span style={{ fontSize:12, fontWeight:700, color:C.white }}>{p.name}</span>
                  <Pill color={p.color}>{p.status}</Pill>
                </div>
                <div style={{ fontSize:9, color:C.gray, marginTop:2 }}>{p.id} · {p.vitals}</div>
                <div style={{ display:"flex", alignItems:"center", gap:6, marginTop:4 }}>
                  <div style={{ flex:1, height:3, background:"rgba(255,255,255,0.1)", borderRadius:3 }}>
                    <div style={{ width:`${p.risk}%`, height:"100%", background:p.color, borderRadius:3 }}/>
                  </div>
                  <span style={{ fontSize:9, color:p.color, fontWeight:700 }}>{p.risk}%</span>
                </div>
              </div>
            </div>
          ))}
          <div style={{ background:"rgba(255,59,92,0.12)", border:`1px solid ${C.red}55`, borderRadius:12, padding:"10px 12px", marginTop:4 }}>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <span style={{ fontSize:16 }}>🧠</span>
              <div>
                <div style={{ fontSize:10, fontWeight:700, color:C.red }}>ML ALERT — Eleanor R.</div>
                <div style={{ fontSize:9, color:C.grayLight }}>87% neurovascular event probability. Assessment triggered.</div>
                <div style={{ fontSize:8, color:C.gray, marginTop:3 }}>14:32:07 · Acknowledged by Dr. Chen</div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const ClinicalMonitor = () => {
      const hrData=[72,75,78,80,88,95,102,98,105,112,118,115];
      const bpData=[130,135,140,148,155,162,170,168,175,180,182,179];
      const spO2Data=[98,98,97,97,96,96,95,96,95,94,94,95];
      return (
        <div style={{ padding:12, overflowY:"auto", height:"100%" }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
            <div>
              <div style={{ fontSize:13, fontWeight:800, color:C.white }}>Eleanor R.</div>
              <div style={{ fontSize:9, color:C.gray }}>PT-4821 · Room 4B · Continuous Monitoring</div>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:6 }}>
              <div style={{ width:6, height:6, borderRadius:"50%", background:C.red, boxShadow:`0 0 6px ${C.red}` }}/>
              <span style={{ fontSize:9, color:C.red, fontWeight:700 }}>LIVE</span>
            </div>
          </div>
          <div style={{ display:"flex", gap:8, marginBottom:8 }}>
            <VitalCard label="Heart Rate" value="118" unit="bpm" color={C.red} sub="↑ Elevated"/>
            <VitalCard label="SpO₂" value="94" unit="%" color={C.amber} sub="↓ Low"/>
          </div>
          <div style={{ display:"flex", gap:8, marginBottom:12 }}>
            <VitalCard label="Blood Pressure" value="182/94" unit="mmHg" color={C.red} sub="↑ Hypertensive"/>
            <VitalCard label="Temp" value="37.2" unit="°C" color={C.green} sub="Normal"/>
          </div>
          {[{label:"Heart Rate",data:hrData,color:C.red,cur:"118",unit:"bpm"},{label:"Blood Pressure (Sys)",data:bpData,color:C.amber,cur:"182",unit:"mmHg"},{label:"SpO₂",data:spO2Data,color:C.blue,cur:"94",unit:"%"}].map((ch,i)=>(
            <div key={i} style={{ background:C.card, border:`1px solid ${C.cardBorder}`, borderRadius:12, padding:"10px 12px", marginBottom:8 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                <span style={{ fontSize:10, color:C.gray }}>{ch.label}</span>
                <span style={{ fontSize:12, fontWeight:700, color:ch.color }}>{ch.cur} {ch.unit}</span>
              </div>
              <Sparkline data={ch.data} color={ch.color}/>
            </div>
          ))}
          <div style={{ background:"rgba(155,89,255,0.1)", border:`1px solid ${C.purple}44`, borderRadius:12, padding:"10px 12px", display:"flex", alignItems:"center", gap:12 }}>
            <RiskGauge pct={87} color={C.red}/>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:10, fontWeight:700, color:C.white, marginBottom:4 }}>ML Risk Analysis</div>
              <div style={{ fontSize:9, color:C.grayLight, lineHeight:1.5 }}>Elevated BP + tachycardia pattern. Ischemic precursor likely. Protocol initiated.</div>
              <div style={{ fontSize:9, color:C.purple, marginTop:6, fontWeight:600 }}>Model updated: 14:35:02</div>
            </div>
          </div>
        </div>
      );
    };

    const ClinicalAssessment = () => {
      const assessments = [
        { time:"14:32", type:"Speech", icon:"🎙️", result:"ABNORMAL", color:C.red, detail:"Slurring detected — 78% confidence", trigger:"Vital Alert" },
        { time:"14:28", type:"Facial Symmetry", icon:"👁️", result:"ABNORMAL", color:C.red, detail:"Left-side drooping detected (AI Vision)", trigger:"Vital Alert" },
        { time:"14:20", type:"Eye Tracking", icon:"👁️", result:"INCONCLUSIVE", color:C.amber, detail:"Nystagmus pattern — re-assessment recommended", trigger:"Scheduled" },
        { time:"13:45", type:"Speech", icon:"🎙️", result:"NORMAL", color:C.green, detail:"No slurring — 94% confidence", trigger:"Scheduled" },
      ];
      return (
        <div style={{ padding:12, overflowY:"auto", height:"100%" }}>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12, background:C.card, borderRadius:10, padding:"8px 12px", border:`1px solid ${C.cardBorder}` }}>
            <span style={{ fontSize:16 }}>👤</span>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:11, fontWeight:700, color:C.white }}>Eleanor R. · PT-4821</div>
              <div style={{ fontSize:9, color:C.gray }}>4 assessments today · FAST Protocol Active</div>
            </div>
            <Pill color={C.red}>HIGH RISK</Pill>
          </div>
          <SectionTitle right="Export">Assessment Timeline</SectionTitle>
          <div style={{ position:"relative", paddingLeft:20 }}>
            <div style={{ position:"absolute", left:7, top:0, bottom:0, width:1, background:"rgba(255,255,255,0.1)" }}/>
            {assessments.map((a,i)=>(
              <div key={i} style={{ position:"relative", marginBottom:10 }}>
                <div style={{ position:"absolute", left:-17, top:8, width:8, height:8, borderRadius:"50%", background:a.color, boxShadow:`0 0 6px ${a.color}` }}/>
                <div style={{ background:C.card, border:`1px solid ${a.color}33`, borderRadius:10, padding:"9px 11px" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}>
                    <span style={{ fontSize:10, fontWeight:700, color:C.white }}>{a.icon} {a.type}</span>
                    <Pill color={a.color}>{a.result}</Pill>
                  </div>
                  <div style={{ fontSize:9, color:C.grayLight }}>{a.detail}</div>
                  <div style={{ display:"flex", gap:8, marginTop:4 }}>
                    <span style={{ fontSize:8, color:C.gray }}>{a.time}</span>
                    <span style={{ fontSize:8, color:C.blue }}>Trigger: {a.trigger}</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
          <div style={{ background:"rgba(255,59,92,0.1)", border:`1px solid ${C.red}44`, borderRadius:12, padding:12, marginTop:4 }}>
            <div style={{ fontSize:10, fontWeight:700, color:C.white, marginBottom:8 }}>FAST Assessment Summary</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6 }}>
              {[{letter:"F",label:"Face Drooping",val:"YES",c:C.red},{letter:"A",label:"Arm Weakness",val:"ASSESS",c:C.amber},{letter:"S",label:"Speech Slurring",val:"YES",c:C.red},{letter:"T",label:"Time to Act",val:"NOW",c:C.red}].map(f=>(
                <div key={f.letter} style={{ display:"flex", alignItems:"center", gap:6 }}>
                  <div style={{ width:20, height:20, borderRadius:6, background:f.c+"33", border:`1px solid ${f.c}66`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:800, color:f.c }}>{f.letter}</div>
                  <div>
                    <div style={{ fontSize:8, color:C.gray }}>{f.label}</div>
                    <div style={{ fontSize:9, fontWeight:700, color:f.c }}>{f.val}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    };

    const ClinicalComms = () => {
      const msgs = [
        { who:"Dr. Chen", role:"Attending", time:"14:33", msg:"Initiating CT protocol for PT-4821. Alert nursing floor 4B immediately.", color:C.blue, avatar:"DC" },
        { who:"Nurse Rivera", role:"Floor RN", time:"14:34", msg:"Confirmed. En route to Room 4B. Crash cart standing by.", color:C.teal, avatar:"NR" },
        { who:"EMS Dispatch", role:"EMS", time:"14:35", msg:"Alert received. Neurology team notified. ETA 8 min.", color:C.purple, avatar:"EM" },
        { who:"Dr. Patel", role:"Neurology", time:"14:36", msg:"Reviewing ML report. Recommend immediate tPA evaluation.", color:C.amber, avatar:"DP" },
      ];
      return (
        <div style={{ display:"flex", flexDirection:"column", height:"100%" }}>
          <div style={{ background:"rgba(255,59,92,0.15)", borderBottom:`1px solid ${C.red}44`, padding:"8px 12px", flexShrink:0 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div style={{ fontSize:9, fontWeight:700, color:C.red }}>🔴 CRITICAL — Eleanor R. PT-4821</div>
              <Pill color={C.red}>URGENT</Pill>
            </div>
            <div style={{ fontSize:8, color:C.grayLight, marginTop:2 }}>87% stroke risk · Repeating every 3 min</div>
            <div style={{ display:"flex", gap:6, marginTop:6 }}>
              <button style={{ flex:1, background:C.teal, border:"none", borderRadius:6, padding:"5px", fontSize:9, fontWeight:700, color:"#000", cursor:"pointer" }}>✓ Acknowledge</button>
              <button style={{ flex:1, background:"rgba(255,59,92,0.2)", border:`1px solid ${C.red}66`, borderRadius:6, padding:"5px", fontSize:9, fontWeight:700, color:C.red, cursor:"pointer" }}>⚠ Escalate</button>
            </div>
          </div>
          <div style={{ padding:"8px 12px", borderBottom:"1px solid rgba(255,255,255,0.06)", flexShrink:0 }}>
            <div style={{ fontSize:9, color:C.gray, marginBottom:5 }}>NOTIFICATION CHAIN</div>
            <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
              {["Floor RN ✓","Charge Nurse ✓","Attending ✓","Neurology ✓","Admin →"].map((s,i)=>(
                <div key={i} style={{ background:s.includes("✓")?C.teal+"22":C.card, border:`1px solid ${s.includes("✓")?C.teal+"44":C.cardBorder}`, borderRadius:8, padding:"3px 8px", fontSize:8, color:s.includes("✓")?C.teal:C.gray }}>{s}</div>
              ))}
            </div>
          </div>
          <div style={{ flex:1, overflowY:"auto", padding:"10px 12px" }}>
            {msgs.map((m,i)=>(
              <div key={i} style={{ display:"flex", gap:8, marginBottom:10 }}>
                <div style={{ width:28, height:28, borderRadius:"50%", background:m.color+"33", border:`1px solid ${m.color}66`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:8, fontWeight:700, color:m.color, flexShrink:0 }}>{m.avatar}</div>
                <div style={{ flex:1 }}>
                  <div style={{ display:"flex", gap:6, alignItems:"baseline", marginBottom:2 }}>
                    <span style={{ fontSize:10, fontWeight:700, color:m.color }}>{m.who}</span>
                    <span style={{ fontSize:8, color:C.gray }}>{m.role}</span>
                    <span style={{ fontSize:8, color:C.gray, marginLeft:"auto" }}>{m.time}</span>
                  </div>
                  <div style={{ background:C.card, border:`1px solid ${C.cardBorder}`, borderRadius:"4px 10px 10px 10px", padding:"7px 9px", fontSize:9, color:C.grayLight, lineHeight:1.4 }}>{m.msg}</div>
                </div>
              </div>
            ))}
          </div>
          <div style={{ padding:"8px 12px", borderTop:"1px solid rgba(255,255,255,0.06)", display:"flex", gap:6, flexShrink:0 }}>
            <div style={{ flex:1, background:C.card, border:`1px solid ${C.cardBorder}`, borderRadius:20, padding:"7px 12px", fontSize:10, color:C.gray }}>Add timestamped note…</div>
            <div style={{ width:32, height:32, borderRadius:"50%", background:C.teal, display:"flex", alignItems:"center", justifyContent:"center", color:"#000", fontSize:14 }}>↑</div>
          </div>
        </div>
      );
    };

    const ClinicalTraining = () => {
      const modules = [
        { title:"FAST Stroke Protocol", type:"Video", duration:"8 min", pct:100, color:C.green, icon:"🎬" },
        { title:"App Navigation Guide", type:"Interactive", duration:"12 min", pct:65, color:C.blue, icon:"📱" },
        { title:"Biosensor Calibration", type:"Video", duration:"5 min", pct:30, color:C.amber, icon:"📡" },
        { title:"Alert Dismissal Protocol", type:"Guide", duration:"3 min", pct:0, color:C.gray, icon:"🔔" },
        { title:"ML Risk Score Interpretation", type:"Course", duration:"20 min", pct:0, color:C.purple, icon:"🧠" },
      ];
      return (
        <div style={{ padding:12, overflowY:"auto", height:"100%" }}>
          <div style={{ background:`linear-gradient(135deg,${C.teal}22,${C.blue}22)`, border:`1px solid ${C.teal}33`, borderRadius:12, padding:12, marginBottom:14 }}>
            <div style={{ fontSize:11, fontWeight:700, color:C.white }}>Training Progress</div>
            <div style={{ fontSize:22, fontWeight:800, color:C.teal, marginTop:4 }}>1 / 5 <span style={{ fontSize:10, fontWeight:400, color:C.gray }}>modules complete</span></div>
            <div style={{ height:4, background:"rgba(255,255,255,0.1)", borderRadius:4, marginTop:8 }}>
              <div style={{ width:"20%", height:"100%", background:C.teal, borderRadius:4 }}/>
            </div>
          </div>
          <SectionTitle>Learning Modules</SectionTitle>
          {modules.map((m,i)=>(
            <div key={i} style={{ background:C.card, border:`1px solid ${m.color}22`, borderRadius:12, padding:"10px 12px", marginBottom:8, display:"flex", alignItems:"center", gap:10 }}>
              <div style={{ width:36, height:36, borderRadius:10, background:m.color+"22", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, flexShrink:0 }}>{m.icon}</div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:11, fontWeight:600, color:C.white }}>{m.title}</div>
                <div style={{ fontSize:9, color:C.gray, marginTop:2 }}>{m.type} · {m.duration}</div>
                {m.pct>0 && (
                  <div style={{ display:"flex", alignItems:"center", gap:6, marginTop:5 }}>
                    <div style={{ flex:1, height:3, background:"rgba(255,255,255,0.1)", borderRadius:3 }}>
                      <div style={{ width:`${m.pct}%`, height:"100%", background:m.color, borderRadius:3 }}/>
                    </div>
                    <span style={{ fontSize:8, color:m.color }}>{m.pct}%</span>
                  </div>
                )}
              </div>
              <div style={{ fontSize:16 }}>{m.pct===100?"✅":m.pct>0?"▶️":"🔒"}</div>
            </div>
          ))}
        </div>
      );
    };

    // ── HOME SCREENS ─────────────────────────────────────────────────────────────

    const HomeMain = () => {
      const hrData=[68,70,72,74,75,73,71,70,72,74,76,75];
      return (
        <div style={{ padding:12, overflowY:"auto", height:"100%" }}>
          <div style={{ marginBottom:14 }}>
            <div style={{ fontSize:16, fontWeight:800, color:C.white }}>Good Afternoon, Margaret 👋</div>
            <div style={{ fontSize:10, color:C.gray }}>Sunday, March 8 · EMS Monitoring: Active</div>
          </div>
          <div style={{ background:`linear-gradient(135deg,${C.teal}18,${C.blue}18)`, border:`1px solid ${C.teal}44`, borderRadius:14, padding:12, marginBottom:12, display:"flex", alignItems:"center", gap:12 }}>
            <RiskGauge pct={24} color={C.teal}/>
            <div style={{ flex:1 }}>

                </div>
                <Phone accent={C.teal}>
                  <ScreenHeader title={clinicalTitles[clinicalTab][0]} subtitle={clinicalTitles[clinicalTab][1]} accent={C.teal}

                  <div style={{ flex:1, overflow:"hidden" }}>{clinicalContent[clinicalTab]}</div>
                  <TabBar tabs={clinicalTabs} active={clinicalTab} onSelect={setClinicalTab} accent={C.teal}/>
                </Phone>
                <div style={{ display:"flex", gap:6, flexWrap:"wrap", justifyContent:"center" }}>
                  {clinicalTabs.map(t=>(
                    <button key={t.id} onClick={()=>setClinicalTab(t.id)} style={{ background:clinicalTab===t.id?C.teal+"22":"rgba(255,255,255,0.04)", border:`1px solid ${clinicalTab===t.id?C.teal+"66":"rgba(255,255,255,0.1)"}`, borderRadius:8, padding:"4px 10px", fontSize:9, color:clinicalTab===t.id?C.teal:C.gray, cursor:"pointer" }}>{t.icon} {t.label}</button>

              </div>

                <div style={{ fontSize:9, color:C.gray, textAlign:"center", letterSpacing:"0.05em" }}>ENCRYPTED<br/>CHANNEL</div>
                <div style={{ fontSize:16 }}>🔒</div>
                <div style={{ width:1, height:80, background:"linear-gradient(to bottom, transparent, rgba(255,255,255,0.2), transparent)" }}/>
